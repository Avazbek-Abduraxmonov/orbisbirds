<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ORBIS BIRDS - My Birds</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary-gold: #FFD700;
            --primary-silver: #C0C0C0;
            --bg-dark: #0a0e27;
            --bg-darker: #060919;
            --accent-cyan: #00d4ff;
            --accent-purple: #b537f2;
            --accent-green: #00ff88;
            --text-light: #e8e9f3;
            --text-dim: #8892b0;
            --card-bg: rgba(20, 25, 50, 0.8);
            --border-glow: rgba(0, 212, 255, 0.3);
        }
        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(181, 55, 242, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
            position: relative;
        }
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
            width: 100%;
        }
        .top-bar {
            background: linear-gradient(135deg, var(--bg-darker) 0%, rgba(20, 25, 50, 0.95) 100%);
            padding: 15px;
            border-bottom: 2px solid var(--border-glow);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 12px;
        }
        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 3px;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .coins-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .coin-card {
            flex: 1 1 120px;
            min-width: 120px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(192, 192, 192, 0.1) 100%);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .coin-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        .coin-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        .coin-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: coin-spin 4s linear infinite;
            flex-shrink: 0;
        }
        @keyframes coin-spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }
        .gold-coin {
            background: radial-gradient(circle, #FFD700, #FFA500);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        .silver-coin {
            background: radial-gradient(circle, #E8E8E8, #A8A8A8);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.6);
        }
        .coin-info {
            flex: 1;
            min-width: 0;
        }
        .coin-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .coin-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: 700;
            color: var(--text-light);
            word-break: break-word;
        }
        .main-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 7vw, 28px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            word-break: break-word;
        }
        .page-subtitle {
            font-size: 13px;
            color: var(--text-dim);
        }
        .birds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .bird-card {
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 16px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bird-card:hover {
            transform: translateX(3px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }
        .bird-image-container {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(181, 55, 242, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .bird-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        .bird-info {
            flex: 1;
            min-width: 0;
        }
        .bird-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .bird-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 700;
            color: var(--text-light);
            word-break: break-word;
        }
        .bird-count {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .bird-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .bird-stat {
            font-size: 11px;
            color: var(--text-dim);
        }
        .bird-stat strong {
            color: var(--accent-green);
            font-weight: 700;
        }
        .bird-actions {
            display: flex;
            gap: 8px;
        }
        .bird-buy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: clamp(11px, 3vw, 14px);
            white-space: nowrap;
        }
        .bird-buy-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5);
        }
        .bird-buy-btn:disabled {
            background: rgba(100, 100, 100, 0.3);
            color: var(--text-dim);
            cursor: not-allowed;
            transform: none;
        }
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s ease;
            max-width: 90%;
            text-align: center;
            font-size: clamp(12px, 4vw, 14px);
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--bg-darker) 0%, rgba(20, 25, 50, 0.98) 100%);
            border-top: 2px solid var(--border-glow);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 4px;
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 5px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: all 0.3s ease;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            max-width: 70px;
            text-decoration: none;
        }
        .nav-btn:hover {
            color: var(--text-light);
            transform: translateY(-2px);
        }
        .nav-btn.active {
            color: var(--accent-cyan);
        }
        .nav-icon {
            width: 22px;
            height: 22px;
        }
        @media (max-width: 400px) {
            .bird-card {
                flex-direction: column;
                text-align: center;
            }
            .bird-image-container {
                margin-bottom: 5px;
            }
            .bird-header {
                justify-content: center;
            }
            .bird-stats {
                justify-content: center;
            }
            .nav-btn {
                font-size: 8px;
                padding: 4px 2px;
            }
            .nav-icon {
                width: 20px;
                height: 20px;
            }
        }
        @media (max-width: 350px) {
            .coins-display {
                flex-direction: column;
            }
            .coin-card {
                width: 100%;
            }
            .nav-btn span {
                display: none;
            }
        }
    </style>
</head>

                color: '#66BB6A'
            }
        };

        let gameState = {
            gold: 5000,
            silver: 200,
            eggs: 0,
            birds: {
                baby: 1,
                yellow: 0,
                red: 0,
                blue: 0,
                green: 0
            },
            referrals: 0,
            referralEarnings: 0,
            lastUpdate: Date.now(),
            tasks: {
                invite: [
                    { id: 1, title: 'Invite 3 Friends', reward: 50, completed: false, current: 0, required: 3 },
                    { id: 2, title: 'Invite 10 Friends', reward: 200, completed: false, current: 0, required: 10 },
                    { id: 3, title: 'Invite 25 Friends', reward: 500, completed: false, current: 0, required: 25 }
                ],
                follow: [
                    { id: 4, title: 'Follow on Twitter', reward: 30, completed: false },
                    { id: 5, title: 'Join Telegram Channel', reward: 30, completed: false },
                    { id: 6, title: 'Follow Instagram', reward: 30, completed: false }
                ],
                other: [
                    { id: 7, title: 'Daily Login Bonus', reward: 10, completed: false },
                    { id: 8, title: 'Share on Social Media', reward: 25, completed: false },
                    { id: 9, title: 'Complete Your Profile', reward: 50, completed: false }
                ]
            }
        };

        function createStars() {
            const starsBg = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsBg.appendChild(star);
            }
        }

        function loadGameState() {
            const saved = localStorage.getItem('orbisBirds');
            if (saved) {
                const loadedState = JSON.parse(saved);
                gameState = { ...gameState, ...loadedState };
                const timePassed = (Date.now() - gameState.lastUpdate) / 1000;
                const eggsProduced = calculateTotalEggsPerSecond() * timePassed;
                gameState.eggs += Math.floor(eggsProduced);
            }
            gameState.lastUpdate = Date.now();
            analytics.logEvent('app_initialized');
        }

        function saveGameState() {
            gameState.lastUpdate = Date.now();
            localStorage.setItem('orbisBirds', JSON.stringify(gameState));
        }

        function calculateTotalEggsPerSecond() {
            let totalPerHour = 0;
            Object.keys(gameState.birds).forEach(birdType => {
                const count = gameState.birds[birdType];
                const eggsPerHour = BIRD_DATA[birdType].eggsPerHour;
                totalPerHour += count * eggsPerHour;
            });
            return totalPerHour / 3600;
        }

        function calculateEggProduction() {
            const eggsPerSecond = calculateTotalEggsPerSecond();
            gameState.eggs += eggsPerSecond;
        }

        function updateUI() {
            document.getElementById('goldAmount').textContent = Math.floor(gameState.gold);
            document.getElementById('silverAmount').textContent = Math.floor(gameState.silver);
        }

        function renderBirds() {
            const grid = document.getElementById('birdsGrid');
            grid.innerHTML = '';
            
            Object.keys(BIRD_DATA).forEach(birdType => {
                const bird = BIRD_DATA[birdType];
                const owned = gameState.birds[birdType];
                const totalEggsPerHour = owned * bird.eggsPerHour;
                
                const card = document.createElement('div');
                card.className = 'bird-card';
                card.innerHTML = `
                    <div class="bird-image-container" style="border: 2px solid ${bird.color};">
                        <img src="${bird.image}" alt="${bird.name}" class="bird-image">
                    </div>
                    <div class="bird-info">
                        <div class="bird-header">
                            <div class="bird-name">${bird.name}</div>
                            <div class="bird-count">${owned}x</div>
                        </div>
                        <div class="bird-stats">
                            <div class="bird-stat">
                                <strong>+${bird.eggsPerHour}</strong> eggs/h
                            </div>
                            <div class="bird-stat">
                                Total: <strong>${totalEggsPerHour}</strong>/h
                            </div>
                        </div>
                        <div class="bird-actions">
                            <button class="bird-buy-btn" onclick="buyBird('${birdType}')" 
                                    ${gameState.gold < bird.cost ? 'disabled' : ''}>
                                Buy for ${bird.cost.toLocaleString()} 🪙
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function buyBird(birdType) {
            const bird = BIRD_DATA[birdType];
            if (gameState.gold >= bird.cost) {
                gameState.gold -= bird.cost;
                gameState.birds[birdType]++;
                showNotification(`✅ Bought ${bird.name}! +${bird.eggsPerHour} eggs/h`);
                renderBirds();
                updateUI();
                saveGameState();
                analytics.logEvent('bird_purchased', {
                    bird_type: birdType,
                    bird_name: bird.name,
                    cost: bird.cost
                });
            } else {
                showNotification('❌ Not enough Gold!');
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function init() {
            createStars();
            loadGameState();
            calculateEggProduction();
            updateUI();
            renderBirds();
            setInterval(() => {
                calculateEggProduction();
                updateUI();
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

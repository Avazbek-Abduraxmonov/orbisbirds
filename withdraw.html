<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ORBIS BIRDS - Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary-gold: #FFD700;
            --primary-silver: #C0C0C0;
            --bg-dark: #0a0e27;
            --bg-darker: #060919;
            --accent-cyan: #00d4ff;
            --accent-purple: #b537f2;
            --accent-green: #00ff88;
            --text-light: #e8e9f3;
            --text-dim: #8892b0;
            --card-bg: rgba(20, 25, 50, 0.8);
            --border-glow: rgba(0, 212, 255, 0.3);
        }
        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(181, 55, 242, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
            position: relative;
        }
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
            width: 100%;
        }
        .top-bar {
            background: linear-gradient(135deg, var(--bg-darker) 0%, rgba(20, 25, 50, 0.95) 100%);
            padding: 15px;
            border-bottom: 2px solid var(--border-glow);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 12px;
        }
        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            letter-spacing: 3px;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .coins-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .coin-card {
            flex: 1 1 120px;
            min-width: 120px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(192, 192, 192, 0.1) 100%);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .coin-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        .coin-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        .coin-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: coin-spin 4s linear infinite;
            flex-shrink: 0;
        }
        @keyframes coin-spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }
        .gold-coin {
            background: radial-gradient(circle, #FFD700, #FFA500);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        .silver-coin {
            background: radial-gradient(circle, #E8E8E8, #A8A8A8);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.6);
        }
        .coin-info {
            flex: 1;
            min-width: 0;
        }
        .coin-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .coin-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: 700;
            color: var(--text-light);
            word-break: break-word;
        }
        .main-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 7vw, 28px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            word-break: break-word;
        }
        .page-subtitle {
            font-size: 13px;
            color: var(--text-dim);
        }
        .withdraw-card {
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 18px;
            padding: 25px;
            text-align: center;
        }
        .withdraw-address {
            width: 100%;
            background: var(--bg-darker);
            border: 2px solid var(--accent-cyan);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Space Mono', monospace;
            font-size: clamp(12px, 4vw, 16px);
            color: var(--text-light);
            text-align: center;
            margin: 15px 0 10px;
            word-break: break-all;
        }
        .withdraw-info {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            font-size: 14px;
            color: var(--text-dim);
        }
        .withdraw-preview {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(18px, 6vw, 24px);
            font-weight: 700;
            color: var(--accent-green);
            margin: 10px 0;
            word-break: break-word;
        }
        .withdraw-input {
            width: 100%;
            background: var(--bg-darker);
            border: 2px solid var(--accent-cyan);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(16px, 5vw, 20px);
            color: var(--text-light);
            text-align: center;
            margin: 15px 0;
        }
        .withdraw-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-green), #00cc70);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 4vw, 16px);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .withdraw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }
        .withdraw-btn:disabled {
            background: rgba(100, 100, 100, 0.3);
            cursor: not-allowed;
            transform: none;
        }
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s ease;
            max-width: 90%;
            text-align: center;
            font-size: clamp(12px, 4vw, 14px);
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--bg-darker) 0%, rgba(20, 25, 50, 0.98) 100%);
            border-top: 2px solid var(--border-glow);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 4px;
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 5px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: all 0.3s ease;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            max-width: 70px;
            text-decoration: none;
        }
        .nav-btn:hover {
            color: var(--text-light);
            transform: translateY(-2px);
        }
        .nav-btn.active {
            color: var(--accent-cyan);
        }
        .nav-icon {
            width: 22px;
            height: 22px;
        }
        @media (max-width: 400px) {
            .nav-btn {
                font-size: 8px;
                padding: 4px 2px;
            }
            .nav-icon {
                width: 20px;
                height: 20px;
            }
        }
        @media (max-width: 350px) {
            .coins-display {
                flex-direction: column;
            }
            .coin-card {
                width: 100%;
            }
            .nav-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="notification" id="notification"></div>
    
    <div class="app-container">
        <div class="top-bar">
            <div class="logo-section">
                <div class="logo-title">ORBIS BIRDS</div>
            </div>
            <div class="coins-display">
                <div class="coin-card">
                    <div class="coin-icon gold-coin">🪙</div>
                    <div class="coin-info">
                        <div class="coin-label">Gold</div>
                        <div class="coin-amount" id="goldAmount">500</div>
                    </div>
                </div>
                <div class="coin-card">
                    <div class="coin-icon silver-coin">🪙</div>
                    <div class="coin-info">
                        <div class="coin-label">Silver</div>
                        <div class="coin-amount" id="silverAmount">200</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <div class="page-title">WITHDRAW</div>
                <div class="page-subtitle">Convert Gold to TON</div>
            </div>
            <div class="withdraw-card">
                <div style="font-size: 50px; margin-bottom: 15px;">💰</div>
                
                <input type="text" class="withdraw-address" id="tonAddress" placeholder="Enter TON address">
                
                <input type="number" class="withdraw-input" id="withdrawInput" placeholder="Enter Gold Amount" min="1000" value="1000" oninput="updateWithdrawPreview()">
                
                <div class="withdraw-info">
                    <div>💎 Rate: 10,000 Gold = 1 TON</div>
                    <div class="withdraw-preview" id="withdrawPreview">0.1 TON</div>
                    <div>⬇️ You will receive this amount</div>
                </div>
                
                <button class="withdraw-btn" onclick="withdraw()">WITHDRAW TO TON</button>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="birds.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C10.3431 2 9 3.34315 9 5C9 5.55228 8.55228 6 8 6C6.34315 6 5 7.34315 5 9V12C5 13.6569 6.34315 15 8 15H16C17.6569 15 19 13.6569 19 12V9C19 7.34315 17.6569 6 16 6C15.4477 6 15 5.55228 15 5C15 3.34315 13.6569 2 12 2Z"/>
                    <path d="M8 15V18C8 19.1046 8.89543 20 10 20H14C15.1046 20 16 19.1046 16 18V15"/>
                </svg>
                <span>Birds</span>
            </a>
            <a href="tasks.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
                <span>Tasks</span>
            </a>
            <a href="eggs.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22c3.314 0 6-4.477 6-10S15.314 2 12 2 6 6.477 6 12s2.686 10 6 10z"/>
                </svg>
                <span>Eggs</span>
            </a>
            <a href="referral.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
                <span>Referral</span>
            </a>
            <a href="withdraw.html" class="nav-btn active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                <span>Withdraw</span>
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZOWkg2731JPE8mIcrcEYDHxU0c5pW9fY",
            authDomain: "orbisbirds.firebaseapp.com",
            projectId: "orbisbirds",
            storageBucket: "orbisbirds.firebasestorage.app",
            messagingSenderId: "162917377393",
            appId: "1:162917377393:web:958e6b8a4455fc557f42d0",
            measurementId: "G-EWZLCKWTV9"
        };

        firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();
        const auth = firebase.auth();
        const db = firebase.firestore();

        const BIRD_DATA = {
            baby: { name: 'Baby Bird', eggsPerHour: 42 },
            yellow: { name: 'Yellow Hawk', eggsPerHour: 221 },
            red: { name: 'Red Phoenix', eggsPerHour: 1160 },
            blue: { name: 'Blue Eagle', eggsPerHour: 6091 },
            green: { name: 'Green Falcon', eggsPerHour: 31979 }
        };

        let gameState = {
            gold: 5000,
            silver: 200,
            eggs: 0,
            birds: {
                baby: 1,
                yellow: 0,
                red: 0,
                blue: 0,
                green: 0
            },
            referrals: 0,
            referralEarnings: 0,
            lastUpdate: Date.now()
        };

        function createStars() {
            const starsBg = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsBg.appendChild(star);
            }
        }

        function loadGameState() {
            const saved = localStorage.getItem('orbisBirds');
            if (saved) {
                const loadedState = JSON.parse(saved);
                gameState = { ...gameState, ...loadedState };
                const timePassed = (Date.now() - gameState.lastUpdate) / 1000;
                const eggsProduced = calculateTotalEggsPerSecond() * timePassed;
                gameState.eggs += Math.floor(eggsProduced);
            }
            gameState.lastUpdate = Date.now();
            analytics.logEvent('app_initialized');
        }

        function saveGameState() {
            gameState.lastUpdate = Date.now();
            localStorage.setItem('orbisBirds', JSON.stringify(gameState));
        }

        function calculateTotalEggsPerSecond() {
            let totalPerHour = 0;
            Object.keys(gameState.birds).forEach(birdType => {
                const count = gameState.birds[birdType];
                const eggsPerHour = BIRD_DATA[birdType].eggsPerHour;
                totalPerHour += count * eggsPerHour;
            });
            return totalPerHour / 3600;
        }

        function calculateEggProduction() {
            const eggsPerSecond = calculateTotalEggsPerSecond();
            gameState.eggs += eggsPerSecond;
        }

        function updateUI() {
            document.getElementById('goldAmount').textContent = Math.floor(gameState.gold);
            document.getElementById('silverAmount').textContent = Math.floor(gameState.silver);
        }

        function updateWithdrawPreview() {
            const input = document.getElementById('withdrawInput');
            const preview = document.getElementById('withdrawPreview');
            const amount = parseInt(input.value) || 0;
            const ton = (amount / 10000).toFixed(4);
            preview.textContent = ton + ' TON';
        }

        function withdraw() {
            const amount = parseInt(document.getElementById('withdrawInput').value) || 0;
            const address = document.getElementById('tonAddress').value.trim();
            
            if (!address) {
                showNotification('❌ Please enter TON address!');
                return;
            }
            
            if (address.length < 30) {
                showNotification('❌ Invalid TON address!');
                return;
            }
            
            if (amount < 1000) {
                showNotification('❌ Minimum withdrawal is 1000 Gold!');
                return;
            }
            
            if (gameState.gold < amount) {
                showNotification('❌ Not enough Gold!');
                return;
            }
            
            const ton = (amount / 10000).toFixed(4);
            gameState.gold -= amount;
            
            showNotification(`✅ Withdrawn ${ton} TON to ${address.substring(0, 6)}...${address.substring(address.length - 4)}!`);
            updateUI();
            saveGameState();
            analytics.logEvent('withdrawal', {
                gold_amount: amount,
                ton_amount: ton,
                address: address.substring(0, 6) + '...'
            });
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function init() {
            createStars();
            loadGameState();
            calculateEggProduction();
            updateUI();
            setInterval(() => {
                calculateEggProduction();
                updateUI();
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
